name: Build Android

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Haxe
      uses: krdlab/setup-haxe@v1
      with:
        haxe-version: 4.3.4

    - name: Install Haxe Libraries
      run: |
        haxelib setup ~/haxelib
        haxelib install lime
        haxelib install openfl
        haxelib install flixel
        haxelib run lime setup
        haxelib run lime setup android
        haxelib install flixel-addons
        haxelib install flixel-ui
        haxelib install hscript
        haxelib git hxdiscord_rpc https://github.com
        haxelib git funkin.vis https://github.com

    - name: Configure Lime for Android
      run: |
        # Configura automáticamente Lime apuntando al SDK y NDK descargados por la Action
        echo "y" | haxelib run lime setup android "${ANDROID_HOME}" "${ANDROID_HOME}/ndk-bundle" "${JAVA_HOME}"

    - name: Build APK
      run: haxelib run lime build android -release

    - name: Upload Artifact
      uses: actions/artifacts@v4
      with:
        name: FNF-VSlice-Android
        path: export/release/android/bin/app/build/outputs/apk/release/*.apk
        
